name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Import smoke (engine + GUI module, no window)
        shell: python
        run: |
          # shell:python runs from a temp file, so the checkout dir (the
          # step's cwd) is not on sys.path by default.
          import os, sys
          sys.path.insert(0, os.getcwd())
          import importlib
          importlib.import_module("alr_quote_verifier")
          from verifier_core import api_key_store, overlay_store, paths  # noqa: F401
          try:
              import tkinter  # noqa: F401
          except ImportError:
              print("tkinter unavailable on this runner; skipping gui import")
          else:
              importlib.import_module("gui")
              print("gui imported OK")

      - name: Run tests
        run: pytest tests/ -q
